<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini calc</title>
    <script src="./script.js"></script>
    <style>
        .calc {
            max-width: 280px;
            padding: 1rem;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        .calc input,
        .calc .result {
            width: 100%;
            box-sizing: border-box;
            padding: 0.5rem;
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }

        .calc .result {
            background: #f5f5f5;
            border: 1px solid #ddd;
            min-height: 1.5rem;
        }

        .calc .ops {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
        }

        .calc button {
            padding: 0.6rem;
            font-size: 1.2rem;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <form class="calc">
        <input type="number" id="calc-input" placeholder="Операнд 1">
        <input type="number" id="calc-input2" placeholder="Операнд 2">
        <div class="ops">
            <button type="button" onclick="calc('+')">+</button>
            <button type="button" onclick="calc('-')">−</button>
            <button type="button" onclick="calc('*')">×</button>
            <button type="button" onclick="calc('/')">÷</button>
        </div>
        <div class="result" id="calc-result">Результат: </div>
    </form>
</body>

</html>
